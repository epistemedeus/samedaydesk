<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Theme-adaptive favicon. prefers-color-scheme keys off the BROWSER chrome, not the
       site theme: oxide stamp on a light tab bar, lime stamp on a dark tab bar. Same mark. -->
  <style>
    .tile { fill: #9e3b2e; }
    .chev { fill: #f4f1ea; }
    @media (prefers-color-scheme: dark) {
      .tile { fill: #ccff00; }
      .chev { fill: #0a0b0d; }
    }
  </style>
  <rect class="tile" width="32" height="32" rx="7"/>
  <path class="chev" d="M6.5 8.5 L15 16 L6.5 23.5 Z"/>
  <path class="chev" d="M15.5 8.5 L24 16 L15.5 23.5 Z"/>
</svg>
