<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- No-FOUC: resolve the theme and paint the right ground BEFORE the React bundle (a
         deferred module) runs. Must stay inline and synchronous. -->
    <script>
      (function () {
        try {
          var KEY = "sdd-theme"; // 'dark' | 'drafting' | 'system'
          var BRAND_DEFAULT = "drafting"; // lead with the Drafting Table (light) look
          var stored = localStorage.getItem(KEY);
          var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme;
          if (stored === "dark" || stored === "drafting") theme = stored;
          else if (stored === "system") theme = systemDark ? "dark" : "drafting";
          else theme = BRAND_DEFAULT;
          var root = document.documentElement;
          root.setAttribute("data-theme", theme);
          root.style.colorScheme = theme === "drafting" ? "light" : "dark";
          root.style.background = theme === "drafting" ? "#F4F1EA" : "#0a0b0d";
          var m = document.createElement("meta");
          m.setAttribute("name", "theme-color");
          m.setAttribute("content", theme === "drafting" ? "#F4F1EA" : "#0a0b0d");
          document.head.appendChild(m);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "drafting");
          document.documentElement.style.background = "#F4F1EA";
        }
      })();
    </script>

    <!-- Per-theme browser chrome (no-JS / system case). JS updates a non-media tag on toggle. -->
    <meta name="theme-color" content="#0a0b0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#F4F1EA" media="(prefers-color-scheme: light)" />
